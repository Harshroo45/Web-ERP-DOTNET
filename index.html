<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Navigator | My Knowledge Base</title>
    <style>
        /* --- CSS VARIABLES & RESET --- */
        :root {
            --primary: #2563eb;
            /* Professional Blue */
            --primary-dark: #1e40af;
            --bg: #f8fafc;
            /* Light Gray Background */
            --surface: #ffffff;
            /* White Cards */
            --text-main: #1e293b;
            /* Dark Slate */
            --text-sec: #64748b;
            /* Muted Text */
            --border: #e2e8f0;
            --accent: #0f172a;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 12px;
            --modal-bg: rgba(15, 23, 42, 0.6);
            --note-bg: #fffbeb;
            --note-text: #92400e;
            --note-border: #f59e0b;
        }

        /* --- DARK MODE OVERRIDES --- */
        body.dark-mode {
            --bg: #0f172a;
            --surface: #1e293b;
            --text-main: #f1f5f9;
            --text-sec: #94a3b8;
            --border: #334155;
            --accent: #f8fafc;
            --shadow: 0 10px 15px -3px rgb(0 0 0 / 0.4);
            --modal-bg: rgba(0, 0, 0, 0.8);
            --note-bg: #2d2a1e;
            --note-text: #fbbf24;
            --note-border: #b45309;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- HEADER --- */
        header {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1.5rem 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            box-shadow: 0 1px 3px rgb(0 0 0 / 0.05);
            position: relative;
        }

        .brand-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        .brand span {
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 6px;
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: 600;
        }

        /* --- DARK MODE TOGGLE --- */
        .theme-toggle {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .theme-toggle:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* --- SEARCH BAR --- */
        .search-container {
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 16px 24px;
            padding-left: 50px;
            padding-right: 50px;
            border-radius: 50px;
            border: 2px solid var(--border);
            font-size: 1rem;
            transition: all 0.2s ease;
            background-color: var(--bg);
            color: var(--text-main);
            outline: none;
        }

        .search-input:focus {
            border-color: var(--primary);
            background-color: var(--surface);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-sec);
            font-size: 1.1rem;
        }

        /* CLEAR SEARCH BUTTON */
        .clear-search {
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-sec);
            cursor: pointer;
            font-size: 1.5rem;
            display: none;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            transition: all 0.2s ease;
        }

        .clear-search:hover {
            color: var(--primary);
            background: rgba(0, 0, 0, 0.1);
        }

        /* --- CATEGORY NAVIGATION --- */
        .category-nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.75rem 0;
            width: 100%;
            display: flex;
            flex-direction: column; /* Changed to handle dropdown */
            align-items: center;
        }

        .nav-inner {
            max-width: 1200px;
            padding: 0 2rem;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            white-space: nowrap;
            scrollbar-width: none;
        }

        .nav-inner::-webkit-scrollbar {
            display: none;
        }

        .cat-btn {
            padding: 8px 18px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-sec);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            transition: 0.2s;
        }

        .cat-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .cat-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
        }

        /* NEW: SUB-ITEM DROPDOWN STYLE */
        .sub-category-container {
            width: 100%;
            background: var(--bg);
            display: none; /* Hidden by default */
            justify-content: center;
            padding: 10px 0;
            border-top: 1px solid var(--border);
            margin-top: 10px;
        }

        .sub-btn {
            padding: 6px 14px;
            margin: 0 5px;
            border-radius: 15px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-sec);
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        
        .sub-btn:hover {
            color: var(--primary);
            border-color: var(--primary);
        }

        /* --- MAIN EXPLORER GRID --- */
        .container {
            max-width: 1200px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
        }

        .stats {
            font-size: 0.9rem;
            color: var(--text-sec);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* --- PATH CARDS --- */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            padding: 1.5rem;
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            cursor: pointer;
            position: relative;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--primary);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent);
        }

        .module-tag {
            font-size: 0.75rem;
            padding: 4px 8px;
            background: #e0f2fe;
            color: #0369a1;
            border-radius: 20px;
            font-weight: 600;
        }

        .tag-finance {
            background: #dcfce7;
            color: #15803d;
        }

        .tag-hr {
            background: #fae8ff;
            color: #86198f;
        }

        .tag-inventory {
            background: #ffedd5;
            color: #9a3412;
        }

        .path-display {
            background: var(--bg);
            padding: 1rem;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            color: var(--text-main);
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 6px;
            pointer-events: none;
        }

        .step {
            display: inline-flex;
            align-items: center;
        }

        .step:not(:last-child)::after {
            content: "→";
            margin-left: 6px;
            color: var(--text-sec);
            font-weight: bold;
        }

        .card-footer {
            margin-top: auto;
            border-top: 1px solid var(--border);
            padding-top: 1rem;
            font-size: 0.85rem;
            color: var(--text-sec);
        }

        .click-hint {
            font-size: 0.75rem;
            color: var(--primary);
            font-weight: 600;
            margin-top: 0.5rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .click-hint {
            opacity: 1;
        }

        /* --- FOOTER --- */
        footer {
            background-color: var(--surface);
            border-top: 1px solid var(--border);
            padding: 2rem;
            text-align: center;
            color: var(--text-sec);
            font-size: 0.9rem;
            margin-top: auto;
        }

        /* --- MODAL (POPUP) --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--modal-bg);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: var(--surface);
            width: 90%;
            max-width: 700px;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
            transform: scale(0.95);
            transition: transform 0.3s ease;
            position: relative;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .modal-subtitle {
            font-size: 0.9rem;
            color: var(--text-sec);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .modal-body {
            background: var(--bg);
            padding: 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .modal-path {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 1.1rem;
            color: var(--text-main);
            line-height: 1.8;
        }

        .modal-note {
            margin-top: 1.5rem;
            padding: 1rem;
            background: var(--note-bg);
            border-left: 4px solid var(--note-border);
            color: var(--note-text);
            border-radius: 4px;
            font-size: 0.95rem;
        }

        .modal-actions {
            margin-top: 2rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-close {
            background: var(--bg);
            color: var(--text-main);
            border: 1px solid var(--border);
        }

        .btn-close:hover {
            background: var(--border);
        }

        .btn-copy {
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-copy:hover {
            background: var(--primary-dark);
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .modal-content {
                padding: 1.5rem;
            }

            .brand-container {
                padding: 0 10px;
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="brand-container">
            <div class="brand">
                <h1>ERP Guide <span>Beta</span></h1>
            </div>
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">
                <svg id="themeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>

        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input type="text" id="searchInput" class="search-input" placeholder="Search for a task ">
            <button class="clear-search" id="clearSearch" title="Clear search">✕</button>
        </div>
    </header>

    <div class="category-nav">
        <div class="nav-inner" id="categoryNav">
            <button class="cat-btn active" onclick="setCategory('All', this)">All</button>
            <button class="cat-btn" onclick="setCategory('Master+Controls+Configuration', this)">Master Controls</button>
            <button class="cat-btn" onclick="setCategory('Day-to-Day Transactions', this)">Day to Day Transaction</button>
            <button class="cat-btn" onclick="setCategory('Overall Query', this)">Overall Query</button>
            <button class="cat-btn" onclick="setCategory('Overall Dashboard', this)">Overall Dashboard</button>
            <button class="cat-btn" onclick="setCategory('Reports', this)">Reports</button>
        </div>
        
        <div class="sub-category-container" id="subItems">
            </div>
    </div>

    <main class="container">
        <div class="section-header">
            <h2 class="section-title">Explorer</h2>
            <span class="stats" id="pathCount">Loading...</span>
        </div>

        <div id="grid" class="grid"></div>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> ERP Navigator by Harshal. All rights reserved.</p>
    </footer>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-subtitle" id="modalModule">Module Name</div>
                <h3 class="modal-title" id="modalTitle">Task Title</h3>
            </div>
            <div class="modal-body">
                <div class="modal-path" id="modalPath"></div>
            </div>
            <div id="modalNote" class="modal-note"></div>
            <div class="modal-actions">
                <button class="btn btn-close" id="closeModalBtn">Close</button>
                <button class="btn btn-copy" id="copyBtn">
                    <span>Copy Path</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- 1. DATA ---
        const erpData = [
            {
                title: "Gate Entry / Entry Delete / Vendor",
                category: "Day-to-Day Transactions",
                subItem: "Stores", // ADDED SUB-ITEM
                module: "Day-to-Day Transactions",
                path: "Day-to-Day Transactions > Stores > Receipt(Item) > Gate Entry IN > Vendor",
                note: "Remember to check the Tax Code before saving.",
                imageURL: "Images/GateEntry.png"
            },
            {
                title: "Issue Item",
                category: "Day-to-Day Transactions",
                subItem: "Stores", // ADDED SUB-ITEM
                module: "Day-to-Day Transactions",
                path: "Stores > Issue(Item) > General",
                note: "Remember to check the Tax Code before saving.",
                imageURL: "Images/IsseItem.png"
            },
            {
                title: "Add New Employee",
                category: "Master+Controls+Configuration",
                subItem: "HR", // ADDED SUB-ITEM
                module: "HR",
                path: "Main Menu > Human Resources > Personnel > Management > Add Employee",
                note: "Employee ID is auto-generated.",
                imageURL: "Images/IsseItem.png"
            },
            // ... (Rest of your data items)
        ];

        // --- 2. DOM ELEMENTS ---
        const grid = document.getElementById('grid');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearch');
        const pathCount = document.getElementById('pathCount');
        const yearSpan = document.getElementById('year');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalModule = document.getElementById('modalModule');
        const modalPath = document.getElementById('modalPath');
        const modalNote = document.getElementById('modalNote');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const copyBtn = document.getElementById('copyBtn');
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const subItemsDiv = document.getElementById('subItems');

        let currentCategory = 'All';
        let currentSubFilter = 'All';
        yearSpan.textContent = new Date().getFullYear();

        // --- 3. DARK MODE LOGIC (ORIGINAL) ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateThemeIcon(isDark);
        }

        function updateThemeIcon(isDark) {
            if (isDark) {
                themeIcon.innerHTML = `<circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>`;
            } else {
                themeIcon.innerHTML = `<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>`;
            }
        }

        if (localStorage.getItem('theme') === 'dark') {
            document.body.classList.add('dark-mode');
            updateThemeIcon(true);
        }

        themeToggle.addEventListener('click', toggleDarkMode);

        // --- 4. HELPER FUNCTIONS (ORIGINAL) ---
        function getModuleClass(moduleName) {
            const mod = moduleName.toLowerCase();
            if (mod.includes('finance')) return 'tag-finance';
            if (mod.includes('hr') || mod.includes('human')) return 'tag-hr';
            if (mod.includes('inventory') || mod.includes('stock')) return 'tag-inventory';
            return '';
        }

        function formatPath(pathString) {
            const steps = pathString.split('>').map(s => s.trim());
            return steps.map(step => `<span class="step">${step}</span>`).join('');
        }

        // --- 5. RENDER & FILTER LOGIC (UPDATED FOR DROPDOWN) ---
        function setCategory(cat, btn) {
            currentCategory = cat;
            currentSubFilter = 'All'; // Reset sub-filter
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            // Handle Dropdown Logic
            const relevantSubs = [...new Set(erpData.filter(i => i.category === cat && i.subItem).map(i => i.subItem))];
            
            if (relevantSubs.length > 0) {
                subItemsDiv.style.display = 'flex';
                subItemsDiv.innerHTML = `<button class="sub-btn" onclick="setSubFilter('All')">All ${cat}</button>`;
                relevantSubs.forEach(s => {
                    subItemsDiv.innerHTML += `<button class="sub-btn" onclick="setSubFilter('${s}')">${s}</button>`;
                });
            } else {
                subItemsDiv.style.display = 'none';
            }

            applyFilters();
        }

        function setSubFilter(sub) {
            currentSubFilter = sub;
            applyFilters();
        }

        function applyFilters() {
            const searchTerm = searchInput.value.toLowerCase();
            clearSearchBtn.style.display = searchTerm.length > 0 ? 'flex' : 'none';

            const filteredData = erpData.filter(item => {
                const matchesCategory = currentCategory === 'All' || item.category === currentCategory;
                const matchesSub = currentSubFilter === 'All' || item.subItem === currentSubFilter;
                const matchesSearch = item.title.toLowerCase().includes(searchTerm) ||
                    item.path.toLowerCase().includes(searchTerm) ||
                    item.module.toLowerCase().includes(searchTerm);

                return matchesCategory && matchesSub && matchesSearch;
            });

            renderCards(filteredData);
        }

        function renderCards(data) {
            grid.innerHTML = '';
            pathCount.textContent = `${data.length} paths found`;

            if (data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 3rem; color: var(--text-sec);"><h3>No paths found.</h3><p>Try a different search or category.</p></div>`;
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openModal(item);
                const moduleClass = getModuleClass(item.module);

                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-title">${item.title}</div>
                        <span class="module-tag ${moduleClass}">${item.category}</span>
                    </div>
                    <div class="path-display">${formatPath(item.path)}</div>
                    <div class="card-footer"><span>${item.note || ''}</span></div>
                    <div class="click-hint">Click to view full details</div>
                `;
                grid.appendChild(card);
            });
        }

        // --- 6. MODAL LOGIC (ORIGINAL) ---
        let currentPathText = "";
        function openModal(item) {
            modalTitle.textContent = item.title;
            modalModule.textContent = item.category + " | " + item.module;
            modalPath.innerHTML = formatPath(item.path);
            currentPathText = item.path;

            if (item.note || item.imageURL) {
                modalNote.style.display = 'block';
                let htmlContent = "";
                if (item.note) htmlContent += `<strong>Tip:</strong> ${item.note}`;
                if (item.imageURL) {
                    htmlContent += `
                        <div style="margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px;">
                            <a href="${item.imageURL}" target="_blank" style="color: var(--primary); font-weight: bold; text-decoration: none; display: block; margin-bottom: 8px;">
                                🔍 Click to view full screenshot
                            </a>
                            <img src="${item.imageURL}" alt="Screenshot" style="width: 100%; border-radius: 8px; border: 1px solid var(--border);" onerror="this.style.display='none'">
                        </div>
                    `;
                }
                modalNote.innerHTML = htmlContent;
            } else {
                modalNote.style.display = 'none';
            }
            modalOverlay.classList.add('active');
        }

        function closeModal() { modalOverlay.classList.remove('active'); }
        closeModalBtn.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(currentPathText).then(() => {
                const originalText = copyBtn.innerHTML;
                copyBtn.innerHTML = "<span>Copied!</span>";
                copyBtn.style.background = "#16a34a";
                setTimeout(() => {
                    copyBtn.innerHTML = originalText;
                    copyBtn.style.background = "";
                }, 2000);
            });
        });

        // --- 7. EVENT LISTENERS (ORIGINAL) ---
        searchInput.addEventListener('input', applyFilters);
        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            applyFilters();
            searchInput.focus();
        });

        renderCards(erpData);
    </script>
</body>

</html>
